<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LudiSec | Under Construction</title>
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --bg-color: #0a0f1a;
            --text-color: #ffffff;
            --accent-color: #00d4ff;
            --widget-bg: rgba(255, 255, 255, 0.08);
        }

        [data-theme="light"] {
            --bg-color: #f8f9fa;
            --text-color: #0a0f1a;
            --accent-color: #0d6efd;
            --widget-bg: rgba(0, 0, 0, 0.05);
        }

        body { 
            margin: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow: hidden; 
            font-family: 'Inter', -apple-system, sans-serif;
            touch-action: manipulation;
        }

        /* Responsive Widgets */
        .widgets {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--widget-bg);
            padding: 6px 10px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(128, 128, 128, 0.2);
        }

        .btn-widget {
            background: none;
            border: none;
            color: var(--text-color);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .btn-widget.active { background: var(--accent-color); color: white; }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            pointer-events: none; 
            padding: 0 25px;
        }

        h1 { font-size: clamp(2.2rem, 10vw, 4.5rem); margin: 0; letter-spacing: 4px; text-transform: uppercase; font-weight: 900; }
        
        p { 
            font-size: clamp(1rem, 4vw, 1.2rem); 
            opacity: 0.9; 
            max-width: 500px; 
            line-height: 1.5; 
            margin: 1.5rem 0; 
        }

        /* Construction Progress Bar */
        .progress-container {
            width: 200px;
            height: 4px;
            background: rgba(128, 128, 128, 0.2);
            border-radius: 10px;
            margin-bottom: 2rem;
            overflow: hidden;
            pointer-events: auto;
        }
        .progress-bar {
            width: 65%;
            height: 100%;
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
            animation: pulse-progress 2s infinite ease-in-out;
        }
        
        @keyframes pulse-progress {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .badge { 
            background: rgba(0, 212, 255, 0.1); 
            border: 1px solid var(--accent-color); 
            padding: 6px 14px; 
            border-radius: 30px; 
            font-size: 0.75rem; 
            font-weight: 800;
            color: var(--accent-color); 
            margin-bottom: 0.8rem;
            letter-spacing: 2px;
        }

        .btn-contact {
            pointer-events: auto;
            background: var(--accent-color);
            color: white !important;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .btn-contact:hover { transform: scale(1.05); }

        /* Mobile specific footer */
        .footer { 
            position: absolute; 
            bottom: 20px; 
            width: 100%; 
            text-align: center; 
            opacity: 0.5; 
            font-size: 0.7rem; 
            z-index: 2; 
            padding: 0 10px;
        }
    </style>
</head>
<body data-theme="dark">

    <div class="widgets">
        <button class="btn-widget" onclick="toggleTheme()" id="themeBtn">
            <i class="bi bi-sun-fill"></i>
        </button>
        <div style="width: 1px; height: 15px; background: rgba(128,128,128,0.3); margin: 0 2px;"></div>
        <button class="btn-widget active" onclick="setLang('en', this)">EN</button>
        <button class="btn-widget" onclick="setLang('es', this)">ES</button>
        <button class="btn-widget" onclick="setLang('ca', this)">CA</button>
    </div>

    <div id="canvas-container"></div>

    <div class="content">
        <div class="badge" id="txt-badge">CONSTRUCTION IN PROGRESS</div>
        <h1 id="txt-title">LudiSec</h1>
        <p id="txt-desc">Our digital defenses are currently being built. We are preparing to turn your employees into a powerful human firewall.</p>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <a href="mailto:admin.ludisec@gmail.com" class="btn-contact" id="txt-contact">
            <i class="bi bi-shield-fill-check"></i>
            <span>Get Early Access</span>
        </a>
    </div>

    <div class="footer" id="txt-footer">
        &copy; 2026 LudiSec Inc. | System Initializing...
    </div>

    <script>
        // --- TRANSLATIONS ---
        const translations = {
            en: {
                badge: "CONSTRUCTION IN PROGRESS",
                desc: "Our digital defenses are currently being built. We are preparing to turn your employees into a powerful human firewall.",
                contact: "Get Early Access",
                footer: "© 2026 LudiSec Inc. | System Initializing..."
            },
            es: {
                badge: "CONSTRUCCIÓN EN CURSO",
                desc: "Nuestras defensas digitales se están construyendo. Nos preparamos para convertir a sus empleados en un potente cortafuegos humano.",
                contact: "Acceso Anticipado",
                footer: "© 2026 LudiSec Inc. | Inicializando sistema..."
            },
            ca: {
                badge: "CONSTRUCCIÓ EN CURS",
                desc: "Les nostres defenses digitals s'estan construint. Ens preparem per convertir els seus empleats en un potent tallafoc humà.",
                contact: "Accés Anticipat",
                footer: "© 2026 LudiSec Inc. | Inicialitzant sistema..."
            }
        };

        function setLang(lang, btn) {
            document.querySelectorAll('.btn-widget').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('txt-badge').innerText = translations[lang].badge;
            document.getElementById('txt-desc').innerText = translations[lang].desc;
            document.getElementById('txt-contact').querySelector('span').innerText = translations[lang].contact;
            document.getElementById('txt-footer').innerText = translations[lang].footer;
        }

        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.querySelector('#themeBtn i').className = isDark ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
            const colorValue = isDark ? 0x0d6efd : 0x00d4ff;
            shieldMesh.material.color.setHex(colorValue);
        }

        // --- THREE.JS MOBILE ENGINE ---
        let scene, camera, renderer, shieldMesh, particles;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // Adjust camera distance for mobile
            const isMobile = window.innerWidth < 768;
            camera.position.z = isMobile ? 10 : 8;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Shield Geometry
            const shieldShape = new THREE.Shape();
            shieldShape.moveTo(0, 1.2);
            shieldShape.quadraticCurveTo(1.2, 1.2, 1.2, 0);
            shieldShape.quadraticCurveTo(1.2, -1.2, 0, -1.8);
            shieldShape.quadraticCurveTo(-1.2, -1.2, -1.2, 0);
            shieldShape.quadraticCurveTo(-1.2, 1.2, 0, 1.2);

            const geometry = new THREE.ExtrudeGeometry(shieldShape, { depth: 0.2, bevelEnabled: true, bevelThickness: 0.1, bevelSize: 0.1 });
            geometry.center();

            const material = new THREE.MeshBasicMaterial({ color: 0x00d4ff, wireframe: true, transparent: true, opacity: 0.3 });
            shieldMesh = new THREE.Mesh(geometry, material);
            
            // Smaller shield on mobile[cite: 1]
            if(isMobile) shieldMesh.scale.set(0.8, 0.8, 0.8);
            
            scene.add(shieldMesh);

            const pCount = isMobile ? 400 : 1000; // Fewer particles on mobile for performance
            const pGeometry = new THREE.BufferGeometry();
            const pCoords = new Float32Array(pCount * 3);
            for (let i = 0; i < pCount * 3; i++) pCoords[i] = (Math.random() - 0.5) * 35;
            pGeometry.setAttribute('position', new THREE.BufferAttribute(pCoords, 3));
            particles = new THREE.Points(pGeometry, new THREE.PointsMaterial({ color: 0x888888, size: 0.02, transparent: true, opacity: 0.3 }));
            particles.position.z = -5;
            scene.add(particles);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            shieldMesh.rotation.y += 0.01;
            particles.rotation.y -= 0.0004;
            shieldMesh.position.y = Math.sin(Date.now() * 0.001) * 0.15;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            // Handle mobile orientation changes[cite: 1]
            const isMobile = window.innerWidth < 768;
            camera.position.z = isMobile ? 10 : 8;
            shieldMesh.scale.set(isMobile ? 0.8 : 1, isMobile ? 0.8 : 1, isMobile ? 0.8 : 1);
        });

        init();
    </script>
</body>
</html>
