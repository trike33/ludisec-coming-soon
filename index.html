<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LudiSec | Coming Soon</title>
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --bg-color: #0a0f1a;
            --text-color: #ffffff;
            --accent-color: #00d4ff;
            --widget-bg: rgba(255, 255, 255, 0.08);
        }

        [data-theme="light"] {
            --bg-color: #f8f9fa;
            --text-color: #0a0f1a;
            --accent-color: #0d6efd;
            --widget-bg: rgba(0, 0, 0, 0.05);
        }

        body { 
            margin: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow: hidden; 
            font-family: 'Inter', -apple-system, sans-serif; 
        }

        .widgets {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--widget-bg);
            padding: 8px 12px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(128, 128, 128, 0.2);
        }

        .btn-widget {
            background: none;
            border: none;
            color: var(--text-color);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-widget:hover { background: rgba(128, 128, 128, 0.2); }
        .btn-widget.active { background: var(--accent-color); color: white; }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            pointer-events: none; 
            padding: 0 20px;
        }

        h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); margin: 0; letter-spacing: 6px; text-transform: uppercase; font-weight: 900; filter: drop-shadow(0 0 20px rgba(0,212,255,0.2)); }
        p { font-size: 1.2rem; opacity: 0.9; max-width: 600px; line-height: 1.6; margin-top: 1rem; margin-bottom: 2.5rem; }
        
        .badge { 
            background: rgba(0, 212, 255, 0.1); 
            border: 1px solid var(--accent-color); 
            padding: 8px 20px; 
            border-radius: 30px; 
            font-size: 0.85rem; 
            font-weight: 800;
            color: var(--accent-color); 
            margin-bottom: 1.5rem;
            letter-spacing: 3px;
        }

        .btn-contact {
            pointer-events: auto;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 16px 36px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .btn-contact:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.5);
            color: white;
        }
        
        .footer { position: absolute; bottom: 30px; width: 100%; text-align: center; opacity: 0.5; font-size: 0.8rem; z-index: 2; }
    </style>
</head>
<body data-theme="dark">

    <div class="widgets">
        <button class="btn-widget" onclick="toggleTheme()" id="themeBtn" title="Toggle Theme">
            <i class="bi bi-sun-fill"></i>
        </button>
        <div style="width: 1px; height: 20px; background: rgba(128,128,128,0.3); margin: 0 4px;"></div>
        <button class="btn-widget active" onclick="setLang('en', this)">EN</button>
        <button class="btn-widget" onclick="setLang('es', this)">ES</button>
        <button class="btn-widget" onclick="setLang('ca', this)">CA</button>
    </div>

    <div id="canvas-container"></div>

    <div class="content">
        <div class="badge" id="txt-badge">KEEP SECURE</div>
        <h1 id="txt-title">LudiSec</h1>
        <p id="txt-desc">Ready to train? We turn your employees into a powerful human firewall through gamified security training.</p>
        
        <a href="mailto:admin.ludisec@gmail.com" class="btn-contact" id="txt-contact">
            <i class="bi bi-shield-fill-check"></i>
            <span>Get Early Access</span>
        </a>
    </div>

    <div class="footer" id="txt-footer">
        &copy; 2026 LudiSec Inc. | Always Protected.
    </div>

    <script>
        // --- TRANSLATIONS ---
        const translations = {
            en: {
                badge: "KEEP SECURE",
                desc: "Ready to train? We turn your employees into a powerful human firewall through gamified security training.",
                contact: "Get Early Access",
                footer: "© 2026 LudiSec Inc. | Always Protected."
            },
            es: {
                badge: "MANTENTE SEGURO",
                desc: "¿Listo para entrenar? Convertimos a sus empleados en un potente cortafuegos humano mediante formación gamificada.",
                contact: "Acceso Anticipado",
                footer: "© 2026 LudiSec Inc. | Siempre Protegido."
            },
            ca: {
                badge: "MANTIGUÉS SEGUR",
                desc: "Llest per entrenar? Convertim els seus empleats en un potent tallafoc humà mitjançant formació gamificada.",
                contact: "Accés Anticipat",
                footer: "© 2026 LudiSec Inc. | Sempre Protegit."
            }
        };

        function setLang(lang, btn) {
            document.querySelectorAll('.btn-widget').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('txt-badge').innerText = translations[lang].badge;
            document.getElementById('txt-desc').innerText = translations[lang].desc;
            document.getElementById('txt-contact').querySelector('span').innerText = translations[lang].contact;
            document.getElementById('txt-footer').innerText = translations[lang].footer;
        }

        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            document.querySelector('#themeBtn i').className = isDark ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
            const colorValue = isDark ? 0x0d6efd : 0x00d4ff;
            shieldMesh.material.color.setHex(colorValue);
        }

        // --- THREE.JS ENGINE ---
        let scene, camera, renderer, shieldMesh, particles;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 8; // Camera at safe distance to prevent clipping

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Create 3D Shield Shape
            const shieldShape = new THREE.Shape();
            shieldShape.moveTo(0, 1.2);
            shieldShape.quadraticCurveTo(1.2, 1.2, 1.2, 0);
            shieldShape.quadraticCurveTo(1.2, -1.2, 0, -1.8);
            shieldShape.quadraticCurveTo(-1.2, -1.2, -1.2, 0);
            shieldShape.quadraticCurveTo(-1.2, 1.2, 0, 1.2);

            const extrudeSettings = { depth: 0.3, bevelEnabled: true, bevelThickness: 0.1, bevelSize: 0.1 };
            const geometry = new THREE.ExtrudeGeometry(shieldShape, extrudeSettings);
            geometry.center();

            const material = new THREE.MeshBasicMaterial({ color: 0x00d4ff, wireframe: true, transparent: true, opacity: 0.4 });
            shieldMesh = new THREE.Mesh(geometry, material);
            scene.add(shieldMesh);

            // Particle Fix: Deep background, tiny points
            const pGeometry = new THREE.BufferGeometry();
            const pCount = 1200;
            const pCoords = new Float32Array(pCount * 3);
            for (let i = 0; i < pCount * 3; i++) {
                pCoords[i] = (Math.random() - 0.5) * 30; // Spread wide
            }
            pGeometry.setAttribute('position', new THREE.BufferAttribute(pCoords, 3));
            particles = new THREE.Points(pGeometry, new THREE.PointsMaterial({ 
                color: 0x888888, 
                size: 0.015, // Fixed size to be tiny dots
                transparent: true, 
                opacity: 0.3 
            }));
            particles.position.z = -5; // Keep particles behind the shield
            scene.add(particles);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            shieldMesh.rotation.y += 0.01; // Smooth rotation
            particles.rotation.y -= 0.0005;
            
            const time = Date.now() * 0.001;
            shieldMesh.position.y = Math.sin(time) * 0.15; // Gentle float
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
