<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LudiSec | Coming Soon</title>
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --bg-color: #0a0f1a;
            --text-color: #ffffff;
            --accent-color: #00d4ff;
            --widget-bg: rgba(255, 255, 255, 0.08);
        }

        [data-theme="light"] {
            --bg-color: #f8f9fa;
            --text-color: #0a0f1a;
            --accent-color: #0d6efd;
            --widget-bg: rgba(0, 0, 0, 0.05);
        }

        body { 
            margin: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow: hidden; 
            font-family: 'Inter', -apple-system, sans-serif; 
        }

        /* Control Widgets */
        .widgets {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--widget-bg);
            padding: 8px 12px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(128, 128, 128, 0.2);
        }

        .btn-widget {
            background: none;
            border: none;
            color: var(--text-color);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-widget:hover { background: rgba(128, 128, 128, 0.2); }
        .btn-widget.active { background: var(--accent-color); color: white; }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            pointer-events: none; /* Allows 3D interaction */
            padding: 0 20px;
        }

        h1 { font-size: clamp(2.5rem, 8vw, 4rem); margin: 0; letter-spacing: 4px; text-transform: uppercase; font-weight: 800; }
        p { font-size: 1.1rem; opacity: 0.8; max-width: 550px; line-height: 1.6; margin-top: 1.2rem; margin-bottom: 2rem; }
        
        .badge { 
            background: rgba(0, 212, 255, 0.1); 
            border: 1px solid var(--accent-color); 
            padding: 6px 16px; 
            border-radius: 30px; 
            font-size: 0.8rem; 
            font-weight: 700;
            color: var(--accent-color); 
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        /* Contact Button */
        .btn-contact {
            pointer-events: auto; /* Important: overrides parent none */
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .btn-contact:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
            color: white;
        }
        
        .footer { position: absolute; bottom: 30px; width: 100%; text-align: center; opacity: 0.5; font-size: 0.8rem; z-index: 2; }
    </style>
</head>
<body data-theme="dark">

    <div class="widgets">
        <button class="btn-widget" onclick="toggleTheme()" id="themeBtn" title="Toggle Theme">
            <i class="bi bi-sun-fill"></i>
        </button>
        <div style="width: 1px; height: 20px; background: rgba(128,128,128,0.3); margin: 0 4px;"></div>
        <button class="btn-widget active" onclick="setLang('en', this)">EN</button>
        <button class="btn-widget" onclick="setLang('es', this)">ES</button>
        <button class="btn-widget" onclick="setLang('ca', this)">CA</button>
    </div>

    <div id="canvas-container"></div>

    <div class="content">
        <div class="badge" id="txt-badge">DEFENSES INITIALIZING</div>
        <h1 id="txt-title">LudiSec</h1>
        <p id="txt-desc">The next generation of gamified cybersecurity training. We turn employees into a human firewall.</p>
        
        <!-- Updated Contact Button -->
        <a href="mailto:admin.ludisec@gmail.com" class="btn-contact" id="txt-contact">
            <i class="bi bi-envelope-at-fill"></i>
            <span>Contact Us</span>
        </a>
    </div>

    <div class="footer" id="txt-footer">
        &copy; 2026 LudiSec Inc. | Stay Vigilant.
    </div>

    <script>
        // --- TRANSLATIONS ---
        const translations = {
            en: {
                badge: "DEFENSES INITIALIZING",
                desc: "The next generation of gamified cybersecurity training. We turn employees into a human firewall.",
                contact: "Contact Us",
                footer: "© 2026 LudiSec Inc. | Stay Vigilant."
            },
            es: {
                badge: "INICIALIZANDO DEFENSAS",
                desc: "La próxima generación de formación gamificada en ciberseguridad. Convertimos a los empleados en un cortafuegos humano.",
                contact: "Contactar",
                footer: "© 2026 LudiSec Inc. | Manténgase Vigilante."
            },
            ca: {
                badge: "INICIALITZANT DEFENSES",
                desc: "La pròxima generació de formació gamificada en ciberseguretat. Convertim els empleats en un tallafoc humà.",
                contact: "Contactar",
                footer: "© 2026 LudiSec Inc. | Estigui Vigilant."
            }
        };

        function setLang(lang, btn) {
            document.querySelectorAll('.btn-widget').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            document.getElementById('txt-badge').innerText = translations[lang].badge;
            document.getElementById('txt-desc').innerText = translations[lang].desc;
            document.getElementById('txt-contact').querySelector('span').innerText = translations[lang].contact;
            document.getElementById('txt-footer').innerText = translations[lang].footer;
        }

        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            
            const themeIcon = document.querySelector('#themeBtn i');
            themeIcon.className = isDark ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
            
            // Update 3D Colors
            const colorValue = isDark ? 0x0d6efd : 0x00d4ff;
            globe.material.color.setHex(colorValue);
            shield.material.color.setHex(colorValue);
        }

        // --- THREE.JS ENGINE ---
        let scene, camera, renderer, globe, shield, particles;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // The Human Firewall Core[cite: 1]
            const geometry = new THREE.IcosahedronGeometry(2, 2);
            const material = new THREE.MeshBasicMaterial({ color: 0x00d4ff, wireframe: true, transparent: true, opacity: 0.3 });
            globe = new THREE.Mesh(geometry, material);
            scene.add(globe);

            // Shield Layer[cite: 1]
            const shieldGeo = new THREE.IcosahedronGeometry(2.5, 1);
            const shieldMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff, wireframe: true, transparent: true, opacity: 0.1 });
            shield = new THREE.Mesh(shieldGeo, shieldMat);
            globe.add(shield);

            // Threat Particles[cite: 1]
            const pGeometry = new THREE.BufferGeometry();
            const pCoords = new Float32Array(800 * 3);
            for (let i = 0; i < 2400; i++) pCoords[i] = (Math.random() - 0.5) * 15;
            pGeometry.setAttribute('position', new THREE.BufferAttribute(pCoords, 3));
            particles = new THREE.Points(pGeometry, new THREE.PointsMaterial({ color: 0x888888, size: 0.03, transparent: true, opacity: 0.5 }));
            scene.add(particles);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            globe.rotation.y += 0.0015;
            globe.rotation.x += 0.0005;
            particles.rotation.y -= 0.0003;
            
            const time = Date.now() * 0.001;
            const scale = 1 + Math.sin(time) * 0.03;
            globe.scale.set(scale, scale, scale);
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
